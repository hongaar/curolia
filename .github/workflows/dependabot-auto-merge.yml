name: Dependabot auto-merge

on:
  pull_request:
    types: [opened, synchronize, reopened]

permissions:
  contents: write
  pull-requests: write

jobs:
  dependabot:
    name: Enable auto-merge
    runs-on: ubuntu-latest
    if: github.event.pull_request.user.login == 'dependabot[bot]'
    steps:
      - name: Dependabot metadata
        id: metadata
        uses: dependabot/fetch-metadata@v3
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Approve pull request
        if: >-
          steps.metadata.outputs.update-type == 'version-update:semver-patch' ||
          steps.metadata.outputs.update-type == 'version-update:semver-minor'
        run: gh pr review --approve "$PR_URL"
        env:
          PR_URL: ${{ github.event.pull_request.html_url }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Enable auto-merge
        if: >-
          steps.metadata.outputs.update-type == 'version-update:semver-patch' ||
          steps.metadata.outputs.update-type == 'version-update:semver-minor'
        run: gh pr merge --auto --squash "$PR_URL"
        env:
          PR_URL: ${{ github.event.pull_request.html_url }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Report auto-merge decision
        if: steps.metadata.outcome == 'success'
        run: |
          update_type="${{ steps.metadata.outputs.update-type }}"
          deps="${{ steps.metadata.outputs.dependency-names }}"
          group="${{ steps.metadata.outputs.dependency-group }}"
          eligible=false
          if [ "$update_type" = "version-update:semver-patch" ] || [ "$update_type" = "version-update:semver-minor" ]; then
            eligible=true
          fi

          if [ "$eligible" = true ]; then
            {
              echo "## Auto-merge: enabled"
              echo ""
              echo "Approved this PR and enabled squash auto-merge. It will merge once required checks pass."
              echo ""
              echo "| Field | Value |"
              echo "| --- | --- |"
              echo "| Update type | \`$update_type\` |"
              echo "| Dependencies | $deps |"
              if [ -n "$group" ]; then
                echo "| Group | \`$group\` |"
              fi
            } >> "$GITHUB_STEP_SUMMARY"
          else
            {
              echo "## Auto-merge: skipped"
              echo ""
              echo "This PR was **not** approved or auto-merged."
              echo ""
              echo "| Field | Value |"
              echo "| --- | --- |"
              echo "| Update type | \`$update_type\` |"
              echo "| Dependencies | $deps |"
              if [ -n "$group" ]; then
                echo "| Group | \`$group\` |"
              fi
              echo ""
              echo "Only patch and minor version updates are auto-merged. Major updates and grouped PRs that include a major bump require manual review."
            } >> "$GITHUB_STEP_SUMMARY"
          fi
