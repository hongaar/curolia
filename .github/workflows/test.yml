name: Test

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  validate:
    name: Validate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: ./.github/actions/turbo-cache

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Format check
        run: npm run format:check

      - name: Validate packages
        run: npx turbo run lint typecheck test build ssr:smoke

  e2e:
    name: E2E
    needs: validate
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Start Supabase
        working-directory: packages/supabase
        run: npx supabase start

      - name: Sync plugin functions
        run: npx turbo run functions:sync

      - name: Load local Supabase credentials
        working-directory: packages/supabase
        run: |
          set -a
          eval "$(npx supabase status -o env)"
          set +a
          echo "SUPABASE_URL=$API_URL" >> "$GITHUB_ENV"
          echo "SUPABASE_SERVICE_ROLE_KEY=$SERVICE_ROLE_KEY" >> "$GITHUB_ENV"
          echo "VITE_SUPABASE_URL=$API_URL" >> "$GITHUB_ENV"
          echo "VITE_SUPABASE_PUBLISHABLE_KEY=$ANON_KEY" >> "$GITHUB_ENV"

      - name: Install Playwright browsers
        working-directory: tests/e2e
        run: npx playwright install --with-deps chromium

      - name: E2E critical paths
        run: npx turbo run e2e --filter=@curolia/e2e
        env:
          CI: "true"
          E2E_ENFORCE_BASELINE: "1"

      - name: Compare E2E baseline
        working-directory: tests/e2e
        run: npm run compare-baseline
        env:
          E2E_ENFORCE_BASELINE: "1"

      - name: Refresh baseline on main
        if: github.ref == 'refs/heads/main' && github.event_name == 'push'
        working-directory: tests/e2e
        run: npm run compare-baseline -- --refresh-baseline

      - name: Commit baseline updates
        if: github.ref == 'refs/heads/main' && github.event_name == 'push'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add tests/baselines/main.json
          git diff --staged --quiet || git commit -m "chore(e2e): refresh performance baseline"
          git push

      - name: Upload Playwright report
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: |
            tests/e2e/playwright-report
            tests/e2e/test-results
            tests/.metrics/metrics.json

  android:
    name: Android
    needs: validate
    runs-on: ubuntu-latest
    env:
      VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
      VITE_SUPABASE_PUBLISHABLE_KEY: ${{ secrets.VITE_SUPABASE_PUBLISHABLE_KEY }}
    steps:
      - uses: actions/checkout@v4

      - uses: ./.github/actions/turbo-cache

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"

      - name: Install dependencies
        run: npm ci

      - name: Prepare native project
        run: npx turbo run sync --filter=@curolia/mobile

      - name: Build Android debug APK
        working-directory: apps/mobile/android
        run: ./gradlew assembleDebug

      - name: Upload Android artifact
        uses: actions/upload-artifact@v4
        with:
          name: android-debug-apk
          path: apps/mobile/android/app/build/outputs/apk/debug/*.apk
          if-no-files-found: error

  ios:
    name: iOS
    needs: validate
    # Capacitor 8 requires Xcode 26+ (preinstalled on macos-26; macos-latest may still be macos-15 / Xcode 16.4).
    runs-on: macos-26
    env:
      VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
      VITE_SUPABASE_PUBLISHABLE_KEY: ${{ secrets.VITE_SUPABASE_PUBLISHABLE_KEY }}
    steps:
      - uses: actions/checkout@v4

      - uses: ./.github/actions/turbo-cache

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Prepare native project
        run: npx turbo run sync --filter=@curolia/mobile

      - name: Sync app version to iOS project
        run: npx tsx scripts/sync-native-version.ts

      - name: Install CocoaPods
        working-directory: apps/mobile/ios/App
        run: pod install

      - name: Build iOS app for simulator (no signing)
        working-directory: apps/mobile/ios/App
        run: |
          xcodebuild \
            -workspace App.xcworkspace \
            -scheme App \
            -configuration Debug \
            -sdk iphonesimulator \
            -destination 'generic/platform=iOS Simulator' \
            CODE_SIGNING_ALLOWED=NO \
            build
