name: Test

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  validate:
    name: Validate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Format check
        run: npm run format:check

      - name: Validate packages
        run: npx turbo run lint typecheck test build

  android:
    name: Android
    needs: validate
    runs-on: ubuntu-latest
    env:
      VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
      VITE_SUPABASE_PUBLISHABLE_KEY: ${{ secrets.VITE_SUPABASE_PUBLISHABLE_KEY }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"

      - name: Install dependencies
        run: npm ci

      - name: Prepare native project
        run: npx turbo run sync --filter=@curolia/mobile

      - name: Build Android debug APK
        working-directory: apps/mobile/android
        run: ./gradlew assembleDebug

      - name: Upload Android artifact
        uses: actions/upload-artifact@v4
        with:
          name: android-debug-apk
          path: apps/mobile/android/app/build/outputs/apk/debug/*.apk
          if-no-files-found: error

  ios:
    name: iOS
    needs: validate
    # Capacitor 8 requires Xcode 26+ (preinstalled on macos-26; macos-latest may still be macos-15 / Xcode 16.4).
    runs-on: macos-26
    env:
      VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
      VITE_SUPABASE_PUBLISHABLE_KEY: ${{ secrets.VITE_SUPABASE_PUBLISHABLE_KEY }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Prepare native project
        run: npx turbo run sync --filter=@curolia/mobile

      - name: Install CocoaPods
        working-directory: apps/mobile/ios/App
        run: pod install

      - name: Build iOS app for simulator (no signing)
        working-directory: apps/mobile/ios/App
        run: |
          xcodebuild \
            -workspace App.xcworkspace \
            -scheme App \
            -configuration Debug \
            -sdk iphonesimulator \
            -destination 'generic/platform=iOS Simulator' \
            CODE_SIGNING_ALLOWED=NO \
            build
