name: Deploy

on:
  workflow_run:
    workflows: [Test]
    types: [completed]
    branches: [main]

jobs:
  eligible:
    name: Check test workflow
    if: >
      github.event.workflow_run.conclusion == 'success' &&
      github.event.workflow_run.event == 'push' &&
      github.event.workflow_run.head_repository.full_name == github.repository
    runs-on: ubuntu-latest
    steps:
      - run: echo "Test passed on main; proceeding with deploy."

  supabase:
    name: Supabase
    needs: eligible
    runs-on: ubuntu-latest
    concurrency:
      group: production-supabase
      cancel-in-progress: false
    environment: production
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.workflow_run.head_sha }}

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Sync plugin Edge Functions into packages/supabase/supabase/functions
        run: npx turbo run functions:sync

      - name: Link project, push migrations, deploy Edge Functions
        working-directory: packages/supabase
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
          SUPABASE_DB_PASSWORD: ${{ secrets.SUPABASE_DB_PASSWORD }}
        run: |
          set -euo pipefail
          npx supabase login --token "$SUPABASE_ACCESS_TOKEN"
          npx supabase link --project-ref "${{ secrets.SUPABASE_PROJECT_REF }}" --password "$SUPABASE_DB_PASSWORD" --yes
          npx supabase db push --yes
          npx supabase functions deploy --use-api --yes

  vercel:
    name: Vercel
    needs: supabase
    runs-on: ubuntu-latest
    environment: production
    env:
      VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
      VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
      VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
      VITE_SUPABASE_PUBLISHABLE_KEY: ${{ secrets.VITE_SUPABASE_PUBLISHABLE_KEY }}
    concurrency:
      group: production-vercel
      cancel-in-progress: false
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.workflow_run.head_sha }}

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Codegen (branding + plugin registry)
        run: npx turbo run codegen

      - name: Pull Vercel environment
        run: npx vercel pull --yes --environment=production --token=${{ secrets.VERCEL_TOKEN }}

      - name: Build Vercel prebuilt output
        run: npx vercel build --prod --token=${{ secrets.VERCEL_TOKEN }}

      - name: Deploy to Vercel production
        run: npx vercel deploy --prebuilt --prod --token=${{ secrets.VERCEL_TOKEN }}

  play-store:
    name: Google Play
    if: vars.ENABLE_PLAY_STORE_DEPLOY == 'true'
    needs: supabase
    runs-on: ubuntu-latest
    environment: production
    concurrency:
      group: play-store-beta
      cancel-in-progress: false
    env:
      VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
      VITE_SUPABASE_PUBLISHABLE_KEY: ${{ secrets.VITE_SUPABASE_PUBLISHABLE_KEY }}
      ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
      ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
      ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
      PLAY_STORE_TRACK: ${{ vars.PLAY_STORE_TRACK || 'internal' }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.workflow_run.head_sha }}

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"

      - name: Install dependencies
        run: npm ci

      - name: Decode Android release keystore
        run: |
          set -euo pipefail
          keystore_path="${{ runner.temp }}/curolia-release.keystore"
          echo "${{ secrets.ANDROID_KEYSTORE_BASE64 }}" | base64 -d > "$keystore_path"
          echo "ANDROID_KEYSTORE_FILE=$keystore_path" >> "$GITHUB_ENV"

      - name: Decode google-services.json (optional)
        env:
          GOOGLE_SERVICES_JSON_BASE64: ${{ secrets.GOOGLE_SERVICES_JSON_BASE64 }}
        run: |
          if [ -n "${GOOGLE_SERVICES_JSON_BASE64:-}" ]; then
            echo "$GOOGLE_SERVICES_JSON_BASE64" | base64 -d > apps/mobile/android/app/google-services.json
          fi

      - name: Prepare native project
        run: npx turbo run sync --filter=@curolia/mobile

      - name: Build signed Android App Bundle
        working-directory: apps/mobile/android
        run: |
          set -euo pipefail
          version_code="${{ github.run_number }}"
          if [ -n "${{ vars.ANDROID_VERSION_CODE_OFFSET }}" ]; then
            version_code=$((version_code + ${{ vars.ANDROID_VERSION_CODE_OFFSET }}))
          fi
          ./gradlew bundleRelease \
            -PversionCode="$version_code" \
            -PversionName="1.0.${{ github.run_number }}"

      - name: Write Play Store changelog
        run: |
          set -euo pipefail
          version_code="${{ github.run_number }}"
          if [ -n "${{ vars.ANDROID_VERSION_CODE_OFFSET }}" ]; then
            version_code=$((version_code + ${{ vars.ANDROID_VERSION_CODE_OFFSET }}))
          fi
          changelog_dir="apps/mobile/android/fastlane/metadata/android/en-US/changelogs"
          mkdir -p "$changelog_dir"
          printf 'Automated build from main (%s)\n' \
            "${{ github.event.workflow_run.head_sha }}" > "$changelog_dir/${version_code}.txt"

      - name: Publish to Google Play
        uses: r0adkll/upload-google-play@v1.1.3
        with:
          serviceAccountJsonPlainText: ${{ secrets.GOOGLE_PLAY_SERVICE_ACCOUNT_JSON }}
          packageName: com.curolia.app
          releaseFiles: apps/mobile/android/app/build/outputs/bundle/release/app-release.aab
          track: ${{ env.PLAY_STORE_TRACK }}
          status: completed
          whatsNewDirectory: apps/mobile/android/fastlane/metadata/android/en-US/changelogs
